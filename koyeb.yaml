name: erp-app
services:
  - name: erp-backend
    git:
      url: https://github.com/aishwarya22-l/ERP_NEW
      branch: main
      dockerfile:
        dockerfile: Dockerfile
        buildpath: Backend
    instance_types:
      - type: free
    regions:
      - was
    ports:
      - port: 5000
        protocol: http
    routes:
      - path: /
        port: 5000
    health_checks:
      - http:
          path: /api/auth
          port: 5000
          method: GET
    env:
      - key: PORT
        value: "5000"
      - key: DB_HOST
        value: "db4free.net"
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        value: "SET_IN_KOYEB_DASHBOARD"
      - key: DB_PASSWORD
        value: "SET_IN_KOYEB_DASHBOARD"
      - key: DB_NAME
        value: "erp"
      - key: SESSION_SECRET
        value: "SET_IN_KOYEB_DASHBOARD"
      - key: CORS_ORIGIN
        value: "SET_IN_KOYEB_DASHBOARD"
