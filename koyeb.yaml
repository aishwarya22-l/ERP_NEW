name: erp-app
services:
  - name: erp-backend
    git:
      url: https://github.com/aishwarya22-l/ERP_NEW
      branch: main
      dockerfile:
        dockerfile: Dockerfile
        buildpath: Backend
    instance_types:
      - type: free
    regions:
      - was
    ports:
      - port: 5000
        protocol: http
    routes:
      - path: /
        port: 5000
    health_checks:
      - http:
          path: /api/auth
          port: 5000
          method: GET
    env:
      - key: PORT
        value: "5000"
      - key: DB_HOST
        value: "CLEVER_CLOUD_HOST_HERE"
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        value: "CLEVER_CLOUD_USER_HERE"
      - key: DB_PASSWORD
        value: "CLEVER_CLOUD_PASS_HERE"
      - key: DB_NAME
        value: "erp"
      - key: SESSION_SECRET
        value: "b7f069bb1c56745c2fe1f5d10fc11cc4cdcd0e12fad780890646a86668a9d1d2"
      - key: CORS_ORIGIN
        value: "https://VERCEL_FRONTEND_URL_HERE"
